name: Validate Dataset

on:
  push:
    paths:
      - 'data/**'
      - 'scripts/validate.py'
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate dataset records
        run: python scripts/validate.py
